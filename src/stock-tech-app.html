<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StockTech Dashboard – StockAiVerse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
    <style>
      /* ── RESET & ROOT ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --blue-900: #0a1628;
        --blue-800: #0d2040;
        --blue-700: #0f3460;
        --blue-600: #1565C0;
        --blue-500: #1976D2;
        --blue-400: #2196F3;
        --blue-300: #64B5F6;
        --blue-100: #BBDEFB;
        --blue-50:  #E3F2FD;
        --accent:   #00B4D8;
        --white:    #ffffff;
        --gray-50:  #F8FAFC;
        --gray-100: #EEF2F7;
        --gray-300: #CBD5E1;
        --gray-500: #64748B;
        --gray-700: #334155;
        --green:    #00C897;
        --red:      #FF4B6E;
        --font:     'Plus Jakarta Sans', sans-serif;
        --serif:    'Instrument Serif', serif;
      }

      html { scroll-behavior: smooth; }
      body {
        font-family: var(--font);
        background: var(--white);
        color: var(--gray-700);
        display: flex;
        height: 100vh;
        overflow: hidden;
      }
      a    { text-decoration: none; color: inherit; cursor: pointer; }
      button { font-family: var(--font); cursor: pointer; border: none; outline: none; }
      em { font-style: italic; font-family: var(--serif); color: var(--accent); font-weight: 400; }

      /* ════════════════════════════
         SIDEBAR
      ════════════════════════════ */
      .sidebar {
        width: 232px;
        min-width: 232px;
        height: 100vh;
        background: var(--white);
        border-right: 1.5px solid var(--gray-100);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 2px 0 20px rgba(21, 101, 192, 0.05);
      }

      /* Logo */
      .sb-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 18px 16px 16px;
        border-bottom: 1.5px solid var(--gray-100);
        flex-shrink: 0;
      }
      .sb-logo-icon {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--blue-600), var(--accent));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        flex-shrink: 0;
        box-shadow: 0 4px 12px rgba(21, 101, 192, 0.3);
      }
      .sb-logo-text {
        font-family: var(--font);
        font-size: 1rem;
        font-weight: 800;
        color: var(--blue-900);
        letter-spacing: -0.3px;
      }
      .sb-logo-text span {
        color: var(--blue-500);
      }

      /* Nav */
      .sb-nav {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 16px 10px 0;
      }
      .sb-nav::-webkit-scrollbar { width: 0; }

      .sb-section-label {
        font-size: 0.66rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--blue-400);
        background: var(--blue-50);
        padding: 4px 10px;
        border-radius: 8px;
        display: inline-block;
        margin: 0 0 10px 2px;
      }

      .sb-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 10px;
        margin-bottom: 3px;
        cursor: pointer;
        color: var(--gray-500);
        font-size: 0.875rem;
        font-weight: 500;
        transition: all 0.2s;
        user-select: none;
        position: relative;
      }
      .sb-item:hover {
        background: var(--blue-50);
        color: var(--blue-600);
      }
      .sb-item.active {
        background: var(--blue-50);
        color: var(--blue-600);
        font-weight: 700;
      }
      .sb-item.active::before {
        content: '';
        position: absolute;
        left: 0;
        top: 22%;
        height: 56%;
        width: 3px;
        border-radius: 0 3px 3px 0;
        background: var(--blue-500);
      }
      .sb-item svg {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        flex-shrink: 0;
      }
      .sb-badge {
        margin-left: auto;
        font-size: 0.64rem;
        font-weight: 700;
        background: var(--blue-500);
        color: var(--white);
        border-radius: 20px;
        padding: 2px 8px;
        letter-spacing: 0.3px;
      }
      .sb-badge.green {
        background: var(--green);
      }

      .sb-divider {
        height: 1.5px;
        background: var(--gray-100);
        margin: 12px 6px;
        border-radius: 2px;
      }

      /* Footer */
      .sb-footer {
        flex-shrink: 0;
        padding: 8px 10px 12px;
        border-top: 1.5px solid var(--gray-100);
      }
      .sb-user {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 10px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .sb-user:hover { background: var(--blue-50); }
      .sb-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--blue-600), var(--accent));
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font);
        font-size: 0.78rem;
        font-weight: 800;
        color: var(--white);
        flex-shrink: 0;
        box-shadow: 0 4px 12px rgba(21, 101, 192, 0.25);
      }
      .sb-user-info { flex: 1; min-width: 0; }
      .sb-user-name {
        font-size: 0.84rem;
        font-weight: 700;
        color: var(--blue-900);
        line-height: 1.2;
      }
      .sb-user-role {
        font-size: 0.67rem;
        color: var(--gray-500);
        font-weight: 500;
      }
      .sb-back-btn {
        background: none;
        border: none;
        color: var(--gray-300);
        font-size: 13px;
        cursor: pointer;
        padding: 2px;
        transition: color 0.2s;
        flex-shrink: 0;
      }
      .sb-back-btn:hover { color: var(--blue-500); }
      .sb-version {
        font-size: 0.65rem;
        color: var(--gray-300);
        padding: 4px 12px 0;
        font-weight: 500;
      }

      /* ════════════════════════════
         MAIN
      ════════════════════════════ */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
        min-width: 0;
        background: var(--gray-50);
      }

      /* Topbar */
      .topbar {
        height: 60px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        padding: 0 26px;
        border-bottom: 1.5px solid var(--gray-100);
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(16px);
        gap: 14px;
        box-shadow: 0 2px 20px rgba(21, 101, 192, 0.05);
      }
      .topbar-title {
        font-family: var(--font);
        font-size: 0.95rem;
        font-weight: 800;
        color: var(--blue-900);
        white-space: nowrap;
        letter-spacing: -0.3px;
      }
      .topbar-title span { color: var(--blue-500); }

      .topbar-sep {
        width: 1.5px;
        height: 20px;
        background: var(--gray-100);
        flex-shrink: 0;
        border-radius: 2px;
      }

      .search-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--gray-50);
        border: 1.5px solid var(--gray-100);
        border-radius: 10px;
        padding: 0 14px;
        height: 38px;
        width: 100%;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .search-wrap:focus-within {
        border-color: var(--blue-400);
        box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.08);
      }
      .search-wrap svg {
        width: 14px;
        height: 14px;
        stroke: var(--gray-300);
        fill: none;
        stroke-width: 2;
        flex-shrink: 0;
      }
      .search-wrap input {
        flex: 1;
        background: none;
        border: none;
        outline: none;
        font-family: var(--font);
        font-size: 0.86rem;
        color: var(--gray-700);
        font-weight: 400;
      }
      .search-wrap input::placeholder { color: var(--gray-300); }

      .topbar-right {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .tb-icon-btn {
        width: 36px;
        height: 36px;
        border-radius: 9px;
        border: 1.5px solid var(--gray-100);
        background: var(--white);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
      }
      .tb-icon-btn:hover {
        border-color: var(--blue-300);
        background: var(--blue-50);
      }
      .tb-icon-btn svg {
        width: 15px;
        height: 15px;
        stroke: var(--gray-500);
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .topbar-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--blue-600), var(--accent));
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font);
        font-size: 0.8rem;
        font-weight: 800;
        color: var(--white);
        cursor: pointer;
        flex-shrink: 0;
        box-shadow: 0 4px 16px rgba(21, 101, 192, 0.3);
        transition: box-shadow 0.2s;
      }
      .topbar-avatar:hover {
        box-shadow: 0 6px 20px rgba(21, 101, 192, 0.4);
      }

      /* Live badge */
      .live-badge {
        display: flex;
        align-items: center;
        gap: 6px;
        background: rgba(0, 200, 151, 0.08);
        border: 1.5px solid rgba(0, 200, 151, 0.25);
        border-radius: 20px;
        padding: 5px 12px;
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--green);
        white-space: nowrap;
        flex-shrink: 0;
        letter-spacing: 0.3px;
        text-transform: uppercase;
      }
      .live-badge .pulse {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--green);
        animation: pulse 1.8s infinite;
      }

      /* ── IFRAME ── */
      #content-frame {
        flex: 1;
        border: none;
        height: 100%;
        min-width: 0;
        display: block;
      }

      /* ── SEARCH DROPDOWN ── */
      .search-container { position: relative; flex: 1; max-width: 380px; }
      .search-clear {
        width: 18px; height: 18px; border-radius: 50%;
        background: var(--gray-300); color: var(--white);
        font-size: 10px; font-weight: 700;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; flex-shrink: 0; transition: background 0.15s;
        user-select: none;
      }
      .search-clear:hover { background: var(--gray-500); }
      .search-dropdown {
        position: absolute; top: calc(100% + 6px); left: 0; right: 0;
        background: var(--white); border: 1.5px solid var(--gray-100);
        border-radius: 14px; overflow: hidden;
        box-shadow: 0 12px 40px rgba(21,101,192,0.12);
        z-index: 999; display: none;
      }
      .search-dropdown.open { display: block; }
      .sd-item {
        display: flex; align-items: center; gap: 12px;
        padding: 11px 16px; cursor: pointer;
        border-bottom: 1px solid var(--gray-100);
        transition: background 0.12s;
      }
      .sd-item:last-child { border-bottom: none; }
      .sd-item:hover { background: var(--blue-50); }
      .sd-icon {
        width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
        background: var(--blue-50); border: 1.5px solid var(--blue-100);
        display: flex; align-items: center; justify-content: center;
        font-size: 0.68rem; font-weight: 800; color: var(--blue-600);
      }
      .sd-symbol {
        font-size: 0.86rem; font-weight: 800; color: var(--blue-900);
        letter-spacing: -0.2px;
      }
      .sd-name { font-size: 0.72rem; color: var(--gray-500); font-weight: 400; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
      .sd-exchange {
        margin-left: auto; font-size: 0.65rem; font-weight: 700;
        color: var(--blue-400); background: var(--blue-50);
        padding: 2px 8px; border-radius: 6px; flex-shrink: 0;
      }
      .sd-state {
        display: flex; align-items: center; gap: 10px;
        padding: 18px 16px; font-size: 0.82rem; color: var(--gray-300); font-weight: 500;
      }
      .sd-state svg { width: 18px; height: 18px; stroke: var(--gray-200); fill: none; stroke-width: 1.8; stroke-linecap: round; flex-shrink: 0; }

      /* ── OHLCV MODAL ── */
      .ohlcv-overlay {
        position: fixed; inset: 0; z-index: 2000;
        background: rgba(10,22,40,0.45); backdrop-filter: blur(4px);
        display: flex; align-items: center; justify-content: center;
        opacity: 0; pointer-events: none; transition: opacity 0.22s;
      }
      .ohlcv-overlay.open { opacity: 1; pointer-events: all; }
      .ohlcv-modal {
        background: var(--white); border: 1.5px solid var(--gray-100);
        border-radius: 20px; width: 480px; max-width: 95vw;
        box-shadow: 0 24px 64px rgba(10,22,40,0.18);
        transform: translateY(16px) scale(0.98); transition: transform 0.22s;
      }
      .ohlcv-overlay.open .ohlcv-modal { transform: translateY(0) scale(1); }
      .ohlcv-modal-head {
        display: flex; align-items: center; justify-content: space-between;
        padding: 18px 22px 16px; border-bottom: 1.5px solid var(--gray-100);
      }
      .ohlcv-modal-symbol { font-size: 1.1rem; font-weight: 800; color: var(--blue-900); letter-spacing: -0.3px; }
      .ohlcv-modal-sub    { font-size: 0.72rem; color: var(--gray-500); margin-top: 2px; font-weight: 500; }
      .ohlcv-modal-name   { font-size: 0.78rem; color: var(--blue-500); font-weight: 600; margin-top: 1px; }
      .ohlcv-close {
        width: 32px; height: 32px; border-radius: 50%;
        background: var(--gray-50); border: 1.5px solid var(--gray-100);
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; color: var(--gray-500); font-size: 14px;
        transition: all 0.15s; flex-shrink: 0;
      }
      .ohlcv-close:hover { background: var(--blue-50); color: var(--blue-600); border-color: var(--blue-300); }
      .ohlcv-body { padding: 20px 22px 22px; }
      .ohlcv-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 14px; }
      .ohlcv-card {
        background: var(--gray-50); border: 1.5px solid var(--gray-100);
        border-radius: 12px; padding: 12px 14px;
      }
      .ohlcv-card-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gray-500); margin-bottom: 5px; }
      .ohlcv-card-val   { font-size: 1rem; font-weight: 800; color: var(--blue-900); letter-spacing: -0.3px; }
      .ohlcv-card-val.green { color: #00a37a; }
      .ohlcv-card-val.red   { color: var(--red); }
      .ohlcv-vol-row {
        display: flex; align-items: center; justify-content: space-between;
        background: var(--blue-50); border: 1.5px solid var(--blue-100);
        border-radius: 12px; padding: 12px 16px;
      }
      .ohlcv-vol-label { font-size: 0.75rem; font-weight: 700; color: var(--blue-600); text-transform: uppercase; letter-spacing: 0.08em; }
      .ohlcv-vol-val   { font-size: 1rem; font-weight: 800; color: var(--blue-900); }
      .ohlcv-state-msg {
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; gap: 10px; padding: 36px 20px; color: var(--gray-300);
      }
      .ohlcv-state-msg svg { width: 32px; height: 32px; stroke: var(--gray-200); fill: none; stroke-width: 1.5; stroke-linecap: round; }
      .ohlcv-state-msg p { font-size: 0.83rem; color: var(--gray-300); font-weight: 500; }
      .ohlcv-state-msg p.err { color: var(--red); font-size: 0.78rem; }

      /* ── TOAST ── */
      .toast {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: var(--blue-900);
        color: white;
        padding: 12px 24px;
        border-radius: 30px;
        font-size: 0.85rem;
        font-weight: 600;
        opacity: 0;
        transition: all 0.3s;
        pointer-events: none;
        z-index: 9999;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      /* ── ANIMATIONS ── */
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.45; }
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>

    <!-- ══════════ SIDEBAR ══════════ -->
    <aside class="sidebar">

      <!-- Logo -->
      <div class="sb-logo">
        <div class="sb-logo-icon">🌐</div>
        <div class="sb-logo-text">Stock<span>AiVerse</span></div>
      </div>

      <!-- Nav -->
      <div class="sb-nav">

        <div class="sb-section-label">Stock Tech Dashboard</div>

        <div class="sb-item active" onclick="loadPage(this,'trending-stock.html')">
          <svg viewBox="0 0 24 24"><path d="M2 17l10-10 4 4 6-6"/><path d="M17 7h4v4"/></svg>
          Trending Stock
        </div>

        <div class="sb-item" onclick="loadPage(this,'breakout-stock.html')">
          <svg viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
          Breakout Stock
        </div>

        <div class="sb-item" onclick="loadPage(this,'pattern-stock.html')">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Pattern
        </div>

        <div class="sb-divider"></div>

        <div class="sb-item" onclick="goTo('stock-tech.html')">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          Back to Main App
        </div>

      </div>

      <!-- Footer -->
      <div class="sb-footer">
        <div class="sb-item" style="margin-bottom:4px;">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Settings
        </div>

        <div class="sb-user">
          <div class="sb-avatar">H</div>
          <div class="sb-user-info">
            <div class="sb-user-name">Harman</div>
            <div class="sb-user-role">Pro Member</div>
          </div>
          <button class="sb-back-btn" onclick="goTo('index.html')" title="Sign out">↗</button>
        </div>
        <div class="sb-version">StockTech v0.1 · Pre-alpha</div>
      </div>
    </aside>

    <!-- ══════════ MAIN ══════════ -->
    <div class="main">

      <!-- Topbar -->
      <div class="topbar">
        <div class="topbar-title">Stock<span>Tech</span></div>
        <div class="topbar-sep"></div>

        <!-- Search -->
        <div class="search-container">
          <div class="search-wrap">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input id="stock-search-input" type="text" placeholder="Search stocks, symbols…" autocomplete="off" />
            <div class="search-clear" id="search-clear" onclick="clearSearch()" style="display:none" title="Clear">✕</div>
          </div>
          <div class="search-dropdown" id="search-dropdown"></div>
        </div>

        <div class="topbar-right">
          <!-- Live badge -->
          <div class="live-badge">
            <span class="pulse"></span>
            Live
          </div>

          <!-- Notifications -->
          <div class="tb-icon-btn" title="Notifications">
            <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          </div>

          <!-- Settings -->
          <div class="tb-icon-btn" title="Settings">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </div>

          <!-- Avatar -->
          <div class="topbar-avatar">H</div>
        </div>
      </div>

      <!-- Content Frame -->
      <iframe id="content-frame" src="trending-stock.html"></iframe>
    </div>

    <!-- OHLCV Modal -->
    <div class="ohlcv-overlay" id="ohlcv-overlay" onclick="closeOHLCVOverlay(event)">
      <div class="ohlcv-modal">
        <div class="ohlcv-modal-head">
          <div>
            <div class="ohlcv-modal-symbol" id="ohlcv-modal-symbol">—</div>
            <div class="ohlcv-modal-name"   id="ohlcv-modal-name"></div>
            <div class="ohlcv-modal-sub"    id="ohlcv-modal-date">OHLCV Data</div>
          </div>
          <div class="ohlcv-close" onclick="closeOHLCVModal()">✕</div>
        </div>
        <div class="ohlcv-body" id="ohlcv-modal-body">
          <div class="ohlcv-state-msg">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <p>Loading…</p>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="navigation.js"></script>
    <script>
      function loadPage(el, page) {
        document.querySelectorAll('.sb-item').forEach(function(item) {
          item.classList.remove('active');
        });
        el.classList.add('active');
        document.getElementById('content-frame').src = page;
      }

      function goTo(page) {
        const t = document.getElementById('toast');
        t.textContent = 'Navigating to ' + page;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2200);
        setTimeout(() => { window.location.href = page; }, 300);
      }

      // Pass hash to iframe on initial load
      var hash = window.location.hash.slice(1);
      if (hash) {
        document.getElementById('content-frame').src = 'trending-stock.html#' + hash;
      }

      /* ══════════════════════════════
         SEARCH — /stocks/search API
      ══════════════════════════════ */
      var searchInput    = document.getElementById('stock-search-input');
      var searchDropdown = document.getElementById('search-dropdown');
      var searchClear    = document.getElementById('search-clear');
      var searchTimer    = null;
      var lastQuery      = '';

      searchInput.addEventListener('input', function() {
        var q = this.value.trim();
        searchClear.style.display = q ? 'flex' : 'none';
        clearTimeout(searchTimer);
        if (q.length < 1) { closeDropdown(); return; }
        if (q === lastQuery) return;
        searchTimer = setTimeout(function() { doSearch(q); }, 300);
      });

      searchInput.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') { clearSearch(); }
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          var items = searchDropdown.querySelectorAll('.sd-item');
          if (items.length) items[0].focus();
        }
      });

      searchDropdown.addEventListener('keydown', function(e) {
        var items = Array.from(searchDropdown.querySelectorAll('.sd-item'));
        var idx   = items.indexOf(document.activeElement);
        if (e.key === 'ArrowDown') { e.preventDefault(); if (items[idx+1]) items[idx+1].focus(); }
        if (e.key === 'ArrowUp')   { e.preventDefault(); if (idx > 0) items[idx-1].focus(); else searchInput.focus(); }
        if (e.key === 'Escape')    { clearSearch(); }
        if (e.key === 'Enter' && idx >= 0) { e.preventDefault(); items[idx].click(); }
      });

      document.addEventListener('click', function(e) {
        if (!e.target.closest('.search-container')) closeDropdown();
      });

      function closeDropdown() {
        searchDropdown.classList.remove('open');
        searchDropdown.innerHTML = '';
      }

      function clearSearch() {
        searchInput.value = '';
        searchClear.style.display = 'none';
        lastQuery = '';
        closeDropdown();
        searchInput.focus();
      }

      async function doSearch(q) {
        lastQuery = q;
        showDropdownState('loading');
        try {
          var res = await fetch('http://localhost:8000/stocks/search?q=' + encodeURIComponent(q) + '&limit=10');
          if (!res.ok) throw new Error('HTTP ' + res.status);
          var data = await res.json();
          var items = Array.isArray(data) ? data : (data.results || data.data || []);
          renderDropdown(items);
        } catch (e) {
          showDropdownState('error', e.message);
        }
      }

      function showDropdownState(type, msg) {
        searchDropdown.classList.add('open');
        if (type === 'loading') {
          searchDropdown.innerHTML =
            '<div class="sd-state"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Searching…</div>';
        } else if (type === 'empty') {
          searchDropdown.innerHTML =
            '<div class="sd-state"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>No results found.</div>';
        } else if (type === 'error') {
          searchDropdown.innerHTML =
            '<div class="sd-state"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
            + (msg || 'Could not connect to search.') + '</div>';
        }
      }

      function renderDropdown(items) {
        if (!items || !items.length) { showDropdownState('empty'); return; }
        searchDropdown.classList.add('open');
        searchDropdown.innerHTML = items.map(function(item) {
          var sym  = item.symbol || item.ticker || item.scrip || '';
          var name = item.name   || item.company_name || item.longName || '';
          var exch = item.exchange || item.exch || item.series || '';
          var abbr = sym.slice(0, 3);
          return '<div class="sd-item" tabindex="0" onclick="onSelectStock(\'' + sym + '\',\'' + escQ(name) + '\')">'
            + '<div class="sd-icon">' + abbr + '</div>'
            + '<div style="flex:1;min-width:0;">'
            +   '<div class="sd-symbol">' + sym + '</div>'
            +   (name ? '<div class="sd-name">' + name + '</div>' : '')
            + '</div>'
            + (exch ? '<div class="sd-exchange">' + exch + '</div>' : '')
            + '</div>';
        }).join('');
      }

      function escQ(s) { return (s || '').replace(/'/g, "\\'"); }

      function onSelectStock(symbol, name) {
        searchInput.value = symbol;
        closeDropdown();
        fetchOHLCV(symbol, name);
      }

      /* ══════════════════════════════
         OHLCV MODAL
      ══════════════════════════════ */
      function fmtPrice(p) {
        return '₹' + Number(p).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }
      function fmtVol(v) {
        v = Number(v);
        if (v >= 1e7) return (v / 1e7).toFixed(2) + ' Cr';
        if (v >= 1e5) return (v / 1e5).toFixed(2) + ' L';
        if (v >= 1e3) return (v / 1e3).toFixed(1) + ' K';
        return v;
      }

      async function fetchOHLCV(symbol, name) {
        document.getElementById('ohlcv-modal-symbol').textContent = symbol;
        document.getElementById('ohlcv-modal-name').textContent   = name || '';
        document.getElementById('ohlcv-modal-date').textContent   = 'OHLCV Data';
        document.getElementById('ohlcv-modal-body').innerHTML =
          '<div class="ohlcv-state-msg"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><p>Loading…</p></div>';
        document.getElementById('ohlcv-overlay').classList.add('open');

        try {
          var res = await fetch('http://localhost:8000/techengine/' + encodeURIComponent(symbol) + '/ohlcv');
          if (!res.ok) {
            var err = await res.json().catch(function() { return { error: 'HTTP ' + res.status }; });
            document.getElementById('ohlcv-modal-body').innerHTML =
              '<div class="ohlcv-state-msg"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
              + '<p>No OHLCV data found.</p><p class="err">' + (err.error || 'Not available') + '</p></div>';
            return;
          }
          var d = await res.json();
          renderOHLCVModal(d);
        } catch (e) {
          document.getElementById('ohlcv-modal-body').innerHTML =
            '<div class="ohlcv-state-msg"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
            + '<p>Could not load data.</p><p class="err">' + e.message + '</p></div>';
        }
      }

      function renderOHLCVModal(d) {
        var arr = Array.isArray(d) ? d : (Array.isArray(d.data) ? d.data : null);
        var rec = arr && arr.length ? arr[arr.length - 1] : d;
        var dateStr = rec.timestamp || rec.date || rec.tsdate || '';
        var fmtDate = dateStr ? dateStr : 'Latest';
        document.getElementById('ohlcv-modal-date').textContent = fmtDate;
        var closeVal = parseFloat(rec.close || rec.close_price || 0);
        var openVal  = parseFloat(rec.open || 0);
        var isUp = closeVal >= openVal;
        var pctRaw = rec.perc_change != null ? parseFloat(rec.perc_change) : ((openVal ? (closeVal - openVal) / openVal * 100 : 0));
        document.getElementById('ohlcv-modal-body').innerHTML =
          '<div class="ohlcv-grid">'
          + '<div class="ohlcv-card"><div class="ohlcv-card-label">Open</div><div class="ohlcv-card-val">'  + fmtPrice(rec.open || 0) + '</div></div>'
          + '<div class="ohlcv-card"><div class="ohlcv-card-label">High</div><div class="ohlcv-card-val green">' + fmtPrice(rec.high || 0) + '</div></div>'
          + '<div class="ohlcv-card"><div class="ohlcv-card-label">Low</div><div class="ohlcv-card-val red">'   + fmtPrice(rec.low  || 0) + '</div></div>'
          + '<div class="ohlcv-card" style="grid-column:span 2;"><div class="ohlcv-card-label">Close</div><div class="ohlcv-card-val ' + (isUp ? 'green' : 'red') + '">' + fmtPrice(closeVal) + '</div></div>'
          + '<div class="ohlcv-card"><div class="ohlcv-card-label">Change</div><div class="ohlcv-card-val ' + (isUp ? 'green' : 'red') + '">' + (isUp ? '▲' : '▼') + ' ' + Math.abs(pctRaw).toFixed(2) + '%</div></div>'
          + '</div>'
          + '<div class="ohlcv-vol-row"><span class="ohlcv-vol-label">Volume</span><span class="ohlcv-vol-val">' + fmtVol(rec.volume || 0) + '</span></div>';
      }

      function closeOHLCVModal() {
        document.getElementById('ohlcv-overlay').classList.remove('open');
      }
      function closeOHLCVOverlay(e) {
        if (e.target === document.getElementById('ohlcv-overlay')) closeOHLCVModal();
      }
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeOHLCVModal();
      });
    </script>
  </body>
</html>
