<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OI Tech Dashboard – StockAiVerse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --blue-900: #0a1628;
        --blue-50:  #E3F2FD;
        --blue-500: #1976D2;
        --accent:   #00B4D8;
        --violet:   #5B21B6;
        --violet-mid: #7C3AED;
        --violet-400: #8B5CF6;
        --violet-light: #EDE9FE;
        --violet-50:  #F5F3FF;
        --white:    #ffffff;
        --gray-50:  #F8FAFC;
        --gray-100: #EEF2F7;
        --gray-300: #CBD5E1;
        --gray-500: #64748B;
        --gray-700: #334155;
        --green:    #00C897;
        --red:      #FF4B6E;
        --amber:    #F59E0B;
        --font:     'Plus Jakarta Sans', sans-serif;
        --serif:    'Instrument Serif', serif;
      }

      html { scroll-behavior: smooth; }
      body {
        font-family: var(--font);
        background: var(--white);
        color: var(--gray-700);
        display: flex;
        height: 100vh;
        overflow: hidden;
      }
      a    { text-decoration: none; color: inherit; cursor: pointer; }
      button { font-family: var(--font); cursor: pointer; border: none; outline: none; }

      /* ════════════════════════════
         SIDEBAR
      ════════════════════════════ */
      .sidebar {
        width: 236px; min-width: 236px; height: 100vh;
        background: var(--white);
        border-right: 1.5px solid var(--gray-100);
        display: flex; flex-direction: column; overflow: hidden;
        box-shadow: 2px 0 20px rgba(91,33,182,0.05);
      }

      .sb-logo {
        display: flex; align-items: center; gap: 10px;
        padding: 18px 16px 16px;
        border-bottom: 1.5px solid var(--gray-100); flex-shrink: 0;
      }
      .sb-logo-icon {
        width: 36px; height: 36px; border-radius: 10px;
        background: linear-gradient(135deg, var(--violet-mid), var(--violet-400));
        display: flex; align-items: center; justify-content: center;
        font-size: 16px; flex-shrink: 0;
        box-shadow: 0 4px 12px rgba(124,58,237,0.3);
      }
      .sb-logo-text { font-size: 1rem; font-weight: 800; color: var(--blue-900); letter-spacing: -0.3px; }
      .sb-logo-text span { color: var(--violet-mid); }

      .sb-nav { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 16px 10px 0; }
      .sb-nav::-webkit-scrollbar { width: 0; }

      .sb-section-label {
        font-size: 0.66rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em;
        color: var(--violet-mid); background: var(--violet-50);
        padding: 4px 10px; border-radius: 8px;
        display: inline-block; margin: 0 0 10px 2px;
      }

      .sb-item {
        display: flex; align-items: center; gap: 10px;
        padding: 10px 12px; border-radius: 10px; margin-bottom: 3px;
        cursor: pointer; color: var(--gray-500);
        font-size: 0.875rem; font-weight: 500;
        transition: all 0.2s; user-select: none; position: relative;
      }
      .sb-item:hover { background: var(--violet-50); color: var(--violet-mid); }
      .sb-item.active { background: var(--violet-50); color: var(--violet-mid); font-weight: 700; }
      .sb-item.active::before {
        content: ''; position: absolute; left: 0; top: 22%; height: 56%;
        width: 3px; border-radius: 0 3px 3px 0; background: var(--violet-mid);
      }
      .sb-item svg {
        width: 16px; height: 16px; stroke: currentColor; fill: none;
        stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0;
      }
      .sb-badge {
        margin-left: auto; font-size: 0.62rem; font-weight: 700;
        border-radius: 20px; padding: 2px 8px; letter-spacing: 0.3px; white-space: nowrap;
      }
      .sb-badge.violet { background: var(--violet-mid); color: var(--white); }
      .sb-badge.green  { background: var(--green); color: var(--white); }
      .sb-badge.amber  { background: var(--amber); color: var(--white); }

      .sb-divider { height: 1.5px; background: var(--gray-100); margin: 10px 6px; border-radius: 2px; }

      .sb-footer { flex-shrink: 0; padding: 8px 10px 12px; border-top: 1.5px solid var(--gray-100); }
      .sb-user {
        display: flex; align-items: center; gap: 10px;
        padding: 10px 12px; border-radius: 10px;
        cursor: pointer; transition: background 0.2s;
      }
      .sb-user:hover { background: var(--violet-50); }
      .sb-avatar {
        width: 32px; height: 32px; border-radius: 50%;
        background: linear-gradient(135deg, var(--violet-mid), var(--violet-400));
        display: flex; align-items: center; justify-content: center;
        font-size: 0.78rem; font-weight: 800; color: var(--white); flex-shrink: 0;
        box-shadow: 0 4px 12px rgba(124,58,237,0.25);
      }
      .sb-user-info { flex: 1; min-width: 0; }
      .sb-user-name { font-size: 0.84rem; font-weight: 700; color: var(--blue-900); line-height: 1.2; }
      .sb-user-role { font-size: 0.67rem; color: var(--gray-500); font-weight: 500; }
      .sb-back-btn {
        background: none; border: none; color: var(--gray-300);
        font-size: 13px; cursor: pointer; padding: 2px;
        transition: color 0.2s; flex-shrink: 0;
      }
      .sb-back-btn:hover { color: var(--violet-mid); }
      .sb-version { font-size: 0.65rem; color: var(--gray-300); padding: 4px 12px 0; font-weight: 500; }

      /* ════════════════════════════
         MAIN
      ════════════════════════════ */
      .main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; min-width: 0; background: var(--gray-50); }

      .topbar {
        height: 60px; flex-shrink: 0;
        display: flex; align-items: center;
        padding: 0 26px; border-bottom: 1.5px solid var(--gray-100);
        background: rgba(255,255,255,0.95); backdrop-filter: blur(16px);
        gap: 14px; box-shadow: 0 2px 20px rgba(91,33,182,0.05);
      }
      .topbar-title { font-size: 0.95rem; font-weight: 800; color: var(--blue-900); white-space: nowrap; letter-spacing: -0.3px; }
      .topbar-title span { color: var(--violet-mid); }
      .topbar-sep { width: 1.5px; height: 20px; background: var(--gray-100); flex-shrink: 0; border-radius: 2px; }

      .search-wrap {
        display: flex; align-items: center; gap: 8px;
        background: var(--gray-50); border: 1.5px solid var(--gray-100);
        border-radius: 10px; padding: 0 14px; height: 38px;
        flex: 1; max-width: 380px; transition: border-color 0.2s, box-shadow 0.2s;
      }
      .search-wrap:focus-within { border-color: var(--violet-400); box-shadow: 0 0 0 3px rgba(139,92,246,0.08); }
      .search-wrap svg { width: 14px; height: 14px; stroke: var(--gray-300); fill: none; stroke-width: 2; flex-shrink: 0; }
      .search-wrap input { flex: 1; background: none; border: none; outline: none; font-family: var(--font); font-size: 0.86rem; color: var(--gray-700); }
      .search-wrap input::placeholder { color: var(--gray-300); }

      .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
      .tb-icon-btn {
        width: 36px; height: 36px; border-radius: 9px;
        border: 1.5px solid var(--gray-100); background: var(--white);
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; transition: all 0.2s;
      }
      .tb-icon-btn:hover { border-color: #c4b5fd; background: var(--violet-50); }
      .tb-icon-btn svg { width: 15px; height: 15px; stroke: var(--gray-500); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

      .live-badge {
        display: flex; align-items: center; gap: 6px;
        background: rgba(0,200,151,0.08); border: 1.5px solid rgba(0,200,151,0.25);
        border-radius: 20px; padding: 5px 12px;
        font-size: 0.72rem; font-weight: 700; color: var(--green);
        white-space: nowrap; flex-shrink: 0; letter-spacing: 0.3px; text-transform: uppercase;
      }
      .live-badge .pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 1.8s infinite; }

      .topbar-avatar {
        width: 36px; height: 36px; border-radius: 50%;
        background: linear-gradient(135deg, var(--violet-mid), var(--violet-400));
        display: flex; align-items: center; justify-content: center;
        font-size: 0.8rem; font-weight: 800; color: var(--white);
        cursor: pointer; flex-shrink: 0; box-shadow: 0 4px 16px rgba(124,58,237,0.3);
      }

      #content-frame { flex: 1; border: none; height: 100%; min-width: 0; display: block; }

      .toast {
        position: fixed; bottom: 28px; left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: var(--blue-900); color: white;
        padding: 12px 24px; border-radius: 30px;
        font-size: 0.85rem; font-weight: 600;
        opacity: 0; transition: all 0.3s; pointer-events: none;
        z-index: 9999; box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      }
      .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }
    </style>
  </head>
  <body>

    <!-- ══════════ SIDEBAR ══════════ -->
    <aside class="sidebar">

      <div class="sb-logo">
        <div class="sb-logo-icon">📊</div>
        <div class="sb-logo-text">OI<span>Tech</span></div>
      </div>

      <div class="sb-nav">

        <div class="sb-section-label">OI Tech Dashboard</div>

        <div class="sb-item active" onclick="loadPage(this,'oi-analyzer.html')">
          <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          OI Analyzer
          <span class="sb-badge green">Live</span>
        </div>

        <div class="sb-item" onclick="loadPage(this,'data.html')">
          <svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
          Data
          <span class="sb-badge violet">HC</span>
        </div>

        <div class="sb-item" onclick="loadPage(this,'oi-pcr.html')">
          <svg viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
          PCR Tracker
        </div>

        <div class="sb-item" onclick="loadPage(this,'oi-strikes.html')">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          Strike Analysis
          <span class="sb-badge amber">Max Pain</span>
        </div>

        <div class="sb-item" onclick="loadPage(this,'oi-heatmap.html')">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          OI Heatmap
        </div>

        <div class="sb-item" onclick="loadPage(this,'oi-buildup.html')">
          <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          Buildup Scanner
        </div>

        <div class="sb-divider"></div>

        <div class="sb-item" onclick="goTo('oi-tech.html')">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          Back to OI Tech
        </div>

      </div>

      <div class="sb-footer">
        <div class="sb-item" style="margin-bottom:4px;">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Settings
        </div>
        <div class="sb-user">
          <div class="sb-avatar">H</div>
          <div class="sb-user-info">
            <div class="sb-user-name">Harman</div>
            <div class="sb-user-role">Pro Member</div>
          </div>
          <button class="sb-back-btn" onclick="goTo('index.html')" title="Sign out">↗</button>
        </div>
        <div class="sb-version">OI Tech v0.1 · Pre-alpha</div>
      </div>
    </aside>

    <!-- ══════════ MAIN ══════════ -->
    <div class="main">

      <div class="topbar">
        <div class="topbar-title">OI<span>Tech</span></div>
        <div class="topbar-sep"></div>

        <div class="search-wrap">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="Search symbol, expiry, strike…" />
        </div>

        <div class="topbar-right">
          <div class="live-badge">
            <span class="pulse"></span>
            Live
          </div>

          <div class="tb-icon-btn" title="Refresh data">
            <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </div>

          <div class="tb-icon-btn" title="Notifications">
            <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          </div>

          <div class="topbar-avatar">H</div>
        </div>
      </div>

      <iframe id="content-frame" src="oi-analyzer.html"></iframe>
    </div>

    <div class="toast" id="toast"></div>

    <script src="navigation.js"></script>
    <script>
      function loadPage(el, page) {
        document.querySelectorAll('.sb-item').forEach(function(item) {
          item.classList.remove('active');
        });
        el.classList.add('active');
        document.getElementById('content-frame').src = page;
      }

      function goTo(page) {
        const t = document.getElementById('toast');
        t.textContent = 'Navigating to ' + page;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2200);
        setTimeout(() => { window.location.href = page; }, 300);
      }
    </script>
  </body>
</html>
