<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trending Stock – StockAiVerse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
        background: #0b0f1a;
        font-family: "DM Sans", sans-serif;
      }

      /* Topbar */
      .topbar {
        height: 58px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        padding: 0 24px;
        border-bottom: 1px solid #1a2540;
        background: #0b0f1a;
        gap: 14px;
      }
      .search-wrap {
        display: flex; align-items: center; gap: 8px;
        background: #111827; border: 1px solid #1e2d47;
        border-radius: 10px; padding: 0 14px;
        height: 36px; flex: 1; max-width: 380px;
        transition: border-color 0.2s;
      }
      .search-wrap:focus-within { border-color: #3b7ef8; }
      .search-wrap svg { width: 14px; height: 14px; stroke: #4f617a; fill: none; stroke-width: 2; flex-shrink: 0; }
      .search-wrap input { flex: 1; background: none; border: none; outline: none; font-family: "DM Sans", sans-serif; font-size: 0.87rem; color: #e8edf5; }
      .search-wrap input::placeholder { color: #4f617a; }
      .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
      .tb-icon-btn {
        width: 34px; height: 34px; border-radius: 8px;
        border: 1px solid #1e2d47; background: #111827;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; transition: border-color 0.2s, background 0.2s;
      }
      .tb-icon-btn:hover { border-color: #3b7ef8; background: #141c2e; }
      .tb-icon-btn svg { width: 15px; height: 15px; stroke: #8899b4; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
      .topbar-avatar {
        width: 34px; height: 34px; border-radius: 50%;
        background: #2563c4; display: flex; align-items: center; justify-content: center;
        font-family: "Sora", sans-serif; font-size: 0.82rem; font-weight: 700;
        color: #fff; cursor: pointer; flex-shrink: 0;
      }

      /* Content */
      .content { flex: 1; overflow-y: auto; padding: 28px 28px 32px; }
      .content::-webkit-scrollbar { width: 5px; }
      .content::-webkit-scrollbar-track { background: transparent; }
      .content::-webkit-scrollbar-thumb { background: #1e2d47; border-radius: 4px; }

      /* Page header */
      .pg-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; gap: 16px; }
      .pg-title { font-family: "Sora", sans-serif; font-size: 1.75rem; font-weight: 800; color: #e8edf5; line-height: 1.2; margin-bottom: 4px; }
      .pg-title span { color: #3b7ef8; }
      .pg-sub { font-size: 0.86rem; color: #8899b4; }
      .pg-sub b { color: #3b7ef8; font-weight: 600; }
      .live-badge {
        display: flex; align-items: center; gap: 6px;
        background: rgba(22,163,74,0.12); border: 1px solid rgba(22,163,74,0.3);
        border-radius: 20px; padding: 5px 12px;
        font-size: 0.75rem; font-weight: 600; color: #4ade80; white-space: nowrap; flex-shrink: 0;
      }
      .live-badge .pulse { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; animation: pulse 1.8s infinite; }
      @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.85)} }

      .date-badge {
        display: flex;
        align-items: center;
        gap: 6px;
        background: rgba(59,126,248,0.1);
        border: 1px solid rgba(59,126,248,0.25);
        border-radius: 20px;
        padding: 5px 12px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #3b7ef8;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .date-badge svg {
        width: 13px; height: 13px;
        stroke: #3b7ef8; fill: none;
        stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
        flex-shrink: 0;
      }

      /* Panel */
      .panel { background: #111827; border: 1px solid #1e2d47; border-radius: 14px; overflow: hidden; }
      .panel-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #1a2540; }
      .panel-title { font-family: "Sora", sans-serif; font-size: 0.9rem; font-weight: 700; color: #e8edf5; }
      .panel-action { font-size: 0.75rem; color: #3b7ef8; cursor: pointer; font-weight: 500; transition: opacity 0.2s; }
      .panel-action:hover { opacity: 0.75; }

      /* Tab Slider */
      .tab-slider { display: inline-flex; align-items: center; background: #111827; border: 1px solid #1e2d47; border-radius: 12px; padding: 4px; gap: 4px; margin-bottom: 24px; }
      .tab-pill { padding: 8px 22px; border-radius: 9px; font-family: "Sora", sans-serif; font-size: 0.84rem; font-weight: 600; color: #8899b4; cursor: pointer; transition: background 0.2s, color 0.2s; user-select: none; white-space: nowrap; }
      .tab-pill:hover { color: #e8edf5; }
      .tab-pill.active { background: #3b7ef8; color: #fff; box-shadow: 0 2px 10px rgba(59,126,248,0.35); }
      .tab-panel { display: none; }
      .tab-panel.active { display: block; }

      /* Filter Bar */
      .filter-bar { display: flex; align-items: center; gap: 8px; padding: 14px 20px; border-bottom: 1px solid #1a2540; }
      .filter-btn {
        padding: 6px 18px; border-radius: 8px;
        font-family: "Sora", sans-serif; font-size: 0.78rem; font-weight: 600;
        cursor: pointer; border: 1px solid #1e2d47; background: transparent; color: #8899b4;
        transition: background 0.2s, color 0.2s, border-color 0.2s; user-select: none; white-space: nowrap;
      }
      .filter-btn:hover { color: #e8edf5; border-color: #2a3f60; }
      .filter-btn.active-green { background: rgba(74,222,128,0.12); border-color: rgba(74,222,128,0.35); color: #4ade80; }
      .filter-btn.active-red   { background: rgba(248,113,113,0.12); border-color: rgba(248,113,113,0.35); color: #f87171; }
      .filter-panel { display: none; }
      .filter-panel.active { display: block; }

      /* ── STOCK TABLE ── */
      .stock-table-wrap { overflow-x: auto; }
      .stock-table {
        width: 100%;
        border-collapse: collapse;
      }
      .stock-table thead tr {
        border-bottom: 1px solid #1a2540;
      }
      .stock-table thead th {
        padding: 10px 20px;
        font-size: 0.68rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #4f617a;
        text-align: left;
        white-space: nowrap;
      }
      .stock-table thead th:last-child { text-align: right; }
      .stock-table tbody tr {
        border-bottom: 1px solid #0f1829;
        transition: background 0.12s;
        cursor: default;
      }
      .stock-table tbody tr:last-child { border-bottom: none; }
      .stock-table tbody tr:hover { background: #0f1829; }
      .stock-table td {
        padding: 13px 20px;
        font-size: 0.85rem;
        color: #8899b4;
        white-space: nowrap;
      }
      .stock-table td:last-child { text-align: right; }

      .td-rank {
        font-family: "Sora", sans-serif;
        font-size: 0.75rem;
        font-weight: 700;
        color: #4f617a;
        width: 36px;
      }
      .td-symbol {
        font-family: "Sora", sans-serif;
        font-size: 0.88rem;
        font-weight: 700;
        color: #e8edf5;
        min-width: 120px;
      }
      .td-price {
        font-family: "Sora", sans-serif;
        font-weight: 600;
        color: #e8edf5;
      }
      .td-change {
        font-family: "Sora", sans-serif;
        font-weight: 700;
        font-size: 0.85rem;
      }
      .td-change.up   { color: #4ade80; }
      .td-change.down { color: #f87171; }
      .td-volume { color: #8899b4; font-size: 0.82rem; }

      /* Loading / error state */
      .state-msg {
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 48px 20px; gap: 10px; color: #4f617a;
      }
      .state-msg svg { width: 34px; height: 34px; stroke: #1e2d47; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
      .state-msg p { font-size: 0.82rem; }
      .state-msg p.err { color: #f87171; font-size: 0.78rem; margin-top: 4px; }

      /* Extra rows hidden until View all */
      .extra-row { display: none; }

      /* Date picker */
      .date-filter-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 24px;
      }
      .date-input-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #111827;
        border: 1px solid #1e2d47;
        border-radius: 10px;
        padding: 0 14px;
        height: 38px;
        transition: border-color 0.2s;
        cursor: pointer;
      }
      .date-input-wrap:focus-within { border-color: #3b7ef8; }
      .date-input-wrap svg { width: 14px; height: 14px; stroke: #4f617a; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
      .date-input-wrap input[type="date"] {
        background: none; border: none; outline: none;
        font-family: "Sora", sans-serif;
        font-size: 0.82rem; font-weight: 600;
        color: #e8edf5; cursor: pointer;
        width: 130px;
      }
      .date-input-wrap input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(0.5); cursor: pointer;
      }

      /* No data banner */
      .no-data-banner {
        display: none;
        align-items: center;
        gap: 10px;
        background: rgba(248,113,113,0.08);
        border: 1px solid rgba(248,113,113,0.25);
        border-radius: 10px;
        padding: 10px 16px;
        font-size: 0.82rem;
        font-weight: 600;
        color: #f87171;
        margin-bottom: 20px;
      }
      .no-data-banner.visible { display: flex; }
      .no-data-banner svg { width: 16px; height: 16px; stroke: #f87171; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    </style>
  </head>
  <body>

    <!-- Topbar -->
    <div class="topbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Search stock symbol…" />
      </div>
      <div class="topbar-right">
        <div class="tb-icon-btn" title="Refresh" onclick="loadData()">
          <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </div>
        <div class="tb-icon-btn" title="Alerts">
          <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </div>
        <div class="topbar-avatar">H</div>
      </div>
    </div>

    <!-- Content -->
    <div class="content">

      <!-- Page header -->
      <div class="pg-header">
        <div>
          <div class="pg-title">Trending <span>Stock</span></div>
          <div class="pg-sub">NSE Markets</div>
        </div>
        <div class="live-badge"><span class="pulse"></span> Live Market</div>
      </div>

      <!-- Tab Slider + Date Filter -->
      <div class="date-filter-row">
        <div class="tab-slider" style="margin-bottom:0;">
          <div class="tab-pill active" onclick="switchTab(this,'price-mover')">Price Mover</div>
          <div class="tab-pill" onclick="switchTab(this,'volume-shockers')">Volume Shockers</div>
        </div>
        <div class="date-input-wrap">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <input type="date" id="date-picker" onchange="onDatePick(this.value)" />
        </div>
      </div>

      <!-- No data banner -->
      <div class="no-data-banner" id="no-data-banner">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="no-data-msg">No data found for selected date.</span>
      </div>

      <!-- ── PRICE MOVER ── -->
      <div class="tab-panel active" id="tab-price-mover">
        <div class="panel" style="margin-bottom:16px;">
          <div class="panel-header">
            <div style="display:flex;align-items:center;gap:10px;">
              <span class="panel-title">Price Mover</span>
              <span id="ts-date-label" style="font-size:0.78rem;font-weight:600;color:#fff;">—</span>
            </div>
            <span class="panel-action" onclick="toggleViewAll(this,'pm')">View all</span>
          </div>
          <div class="filter-bar">
            <button class="filter-btn active-green" onclick="switchFilter(this,'pm','gainers')">Top Gainers</button>
            <button class="filter-btn" onclick="switchFilter(this,'pm','losers')">Top Losers</button>
          </div>
          <div class="filter-panel active" id="filter-pm-gainers"><div class="state-msg"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><p>Loading…</p></div></div>
          <div class="filter-panel"        id="filter-pm-losers"> <div class="state-msg"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><p>Loading…</p></div></div>
        </div>
      </div>

      <!-- ── VOLUME SHOCKERS ── -->
      <div class="tab-panel" id="tab-volume-shockers">
        <div class="panel" style="margin-bottom:16px;">
          <div class="panel-header">
            <span class="panel-title">Volume Shockers</span>
            <span class="panel-action" onclick="toggleViewAll(this,'vs')">View all</span>
          </div>
          <div class="filter-bar">
            <button class="filter-btn active-green" onclick="switchFilter(this,'vs','gainers')">Volume Gainer</button>
          </div>
          <div class="filter-panel active" id="filter-vs-gainers"><div class="state-msg"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><p>Loading…</p></div></div>
          <div class="filter-panel"        id="filter-vs-losers"> <div class="state-msg"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><p>Loading…</p></div></div>
        </div>
      </div>

    </div><!-- end content -->

    <script>
      /* ── HELPERS ── */
      function fmtVol(v) {
        if (v >= 1e7) return (v / 1e7).toFixed(2) + ' Cr';
        if (v >= 1e5) return (v / 1e5).toFixed(2) + ' L';
        if (v >= 1e3) return (v / 1e3).toFixed(1) + ' K';
        return v;
      }

      function fmtPrice(p) {
        return '₹' + Number(p).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

      /* ── RENDER ── */
      function renderTable(containerId, stocks, type) {
        const el = document.getElementById(containerId);
        if (!stocks || stocks.length === 0) {
          el.innerHTML = '<div class="state-msg"><p>No data available.</p></div>';
          return;
        }
        const arrow = type === 'gainers' ? '▲' : '▼';
        const changeClass = type === 'gainers' ? 'up' : 'down';
        let rows = stocks.map((s, i) => `
          <tr${i >= 5 ? ' class="extra-row"' : ''}>
            <td class="td-rank">${i + 1}</td>
            <td class="td-symbol">${s.symbol}</td>
            <td class="td-price">${fmtPrice(s.close_price)}</td>
            <td class="td-change ${changeClass}">${arrow} ${Math.abs(s.perc_change).toFixed(2)}%</td>
            <td class="td-volume">${fmtVol(s.volume)}</td>
          </tr>`).join('');
        el.innerHTML = `
          <div class="stock-table-wrap">
            <table class="stock-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Symbol</th>
                  <th>Close Price</th>
                  <th>Change</th>
                  <th>Volume</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;
      }

      function showError(msg) {
        ['filter-pm-gainers','filter-pm-losers'].forEach(function(id) {
          document.getElementById(id).innerHTML =
            '<div class="state-msg"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
            + '<p>Could not load data.</p><p class="err">' + msg + '</p></div>';
        });
      }

      function showVsError(msg) {
        document.getElementById('filter-vs-gainers').innerHTML =
          '<div class="state-msg"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
          + '<p>Could not load data.</p><p class="err">' + msg + '</p></div>';
      }

      /* ── FETCH ── */
      function setLoading() {
        const spinner = '<div class="state-msg"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><p>Loading…</p></div>';
        ['filter-pm-gainers','filter-pm-losers','filter-vs-gainers'].forEach(id => {
          document.getElementById(id).innerHTML = spinner;
        });
        document.getElementById('no-data-banner').classList.remove('visible');
      }

      function renderData(data) {
        const d   = data.tsdate;
        const fmt = d.slice(6,8) + '/' + d.slice(4,6) + '/' + d.slice(0,4);
        document.getElementById('ts-date-label').textContent = fmt;
        renderTable('filter-pm-gainers', data.top_gainers, 'gainers');
        renderTable('filter-pm-losers',  data.top_losers,  'losers');
        // Reset Price Mover View all button
        var pmPanel = document.getElementById('tab-price-mover');
        pmPanel.querySelector('.panel-action').textContent = 'View all';
        pmPanel.querySelectorAll('.extra-row').forEach(r => r.style.display = 'none');
      }

      function renderVsTable(containerId, stocks) {
        const el = document.getElementById(containerId);
        if (!stocks || stocks.length === 0) {
          el.innerHTML = '<div class="state-msg"><p>No data available.</p></div>';
          return;
        }
        let rows = stocks.map((s, i) => `
          <tr${i >= 5 ? ' class="extra-row"' : ''}>
            <td class="td-rank">${i + 1}</td>
            <td class="td-symbol">${s.symbol}</td>
            <td class="td-volume">${fmtVol(s.volume)}</td>
            <td class="td-volume">${fmtVol(s.emavol20)}</td>
            <td class="td-change up">${Number(s.volume_shocker).toFixed(2)}x</td>
          </tr>`).join('');
        el.innerHTML = `
          <div class="stock-table-wrap">
            <table class="stock-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Symbol</th>
                  <th>Volume</th>
                  <th>EMA Vol (20D)</th>
                  <th>Shock Ratio</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;
      }

      function renderVsData(data) {
        renderVsTable('filter-vs-gainers', data.volume_shockers);
        // Reset Volume Shockers View all button
        var vsPanel = document.getElementById('tab-volume-shockers');
        vsPanel.querySelector('.panel-action').textContent = 'View all';
        vsPanel.querySelectorAll('.extra-row').forEach(r => r.style.display = 'none');
      }

      async function loadData(dateStr) {
        setLoading();
        const pmUrl = dateStr ? '/data/trending/' + dateStr : '/data/trending-latest';
        const vsUrl = dateStr ? '/data/volumeshocker/' + dateStr : '/data/volumeshocker-latest';

        // Price Mover
        try {
          const res = await fetch(pmUrl);
          if (res.status === 404) {
            const banner = document.getElementById('no-data-banner');
            document.getElementById('no-data-msg').textContent =
              'No data found for ' + dateStr.slice(6,8) + '/' + dateStr.slice(4,6) + '/' + dateStr.slice(0,4);
            banner.classList.add('visible');
            ['filter-pm-gainers','filter-pm-losers'].forEach(id => {
              document.getElementById(id).innerHTML = '<div class="state-msg"><p>—</p></div>';
            });
            document.getElementById('ts-date-label').textContent = '—';
          } else if (!res.ok) {
            throw new Error('HTTP ' + res.status);
          } else {
            renderData(await res.json());
          }
        } catch (e) {
          showError(e.message);
        }

        // Volume Shockers
        try {
          const vsRes = await fetch(vsUrl);
          if (vsRes.status === 404) {
            document.getElementById('filter-vs-gainers').innerHTML = '<div class="state-msg"><p>No volume shocker data for this date.</p></div>';
          } else if (!vsRes.ok) {
            throw new Error('HTTP ' + vsRes.status);
          } else {
            renderVsData(await vsRes.json());
          }
        } catch (e) {
          showVsError(e.message);
        }
      }

      function onDatePick(value) {
        if (!value) return;
        // value is YYYY-MM-DD, convert to YYYYMMDD
        const dateStr = value.replace(/-/g, '');
        loadData(dateStr);
      }

      /* ── TAB / FILTER SWITCHING ── */
      function switchTab(el, tab) {
        document.querySelectorAll('.tab-pill').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
      }

      function switchFilter(el, group, filter) {
        el.closest('.filter-bar').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-green','active-red'));
        el.classList.add(filter === 'gainers' ? 'active-green' : 'active-red');
        document.getElementById('filter-' + group + '-gainers').classList.remove('active');
        document.getElementById('filter-' + group + '-losers').classList.remove('active');
        document.getElementById('filter-' + group + '-' + filter).classList.add('active');
        // Reset View all button and re-hide extra rows when switching filter
        var tabId = group === 'pm' ? 'tab-price-mover' : 'tab-volume-shockers';
        var panelEl = document.getElementById(tabId);
        panelEl.querySelector('.panel-action').textContent = 'View all';
        panelEl.querySelectorAll('.extra-row').forEach(r => r.style.display = 'none');
      }

      function toggleViewAll(el, group) {
        var tabId = group === 'pm' ? 'tab-price-mover' : 'tab-volume-shockers';
        var activeFilter = document.getElementById(tabId).querySelector('.filter-panel.active');
        var extraRows = activeFilter.querySelectorAll('.extra-row');
        var expanded = el.textContent === 'Show less';
        extraRows.forEach(r => r.style.display = expanded ? 'none' : 'table-row');
        el.textContent = expanded ? 'View all' : 'Show less';
      }

      /* ── INIT ── */
      loadData();
    </script>
  </body>
</html>
